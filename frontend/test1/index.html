<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bengo Backend Test UI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <h1>Bengo <span class="badge-dev">dev</span></h1>
        <div class="auth-status" id="authStatus">
          <span class="status-dot offline"></span>
          <span id="authStatusText">로그인 필요</span>
        </div>
      </div>
      <div class="base-url-box">
        <label for="baseUrl">서버</label>
        <input id="baseUrl" type="text" value="http://localhost:4000" style="width:220px" />
        <button id="saveBaseUrlBtn" class="btn-sm">저장</button>
        <button id="clearTokenBtn" class="btn-sm secondary">로그아웃</button>
      </div>
    </header>

    <main class="grid">

      <!-- ── 1. 인증 ── -->
      <section class="card">
        <div class="section-header">
          <span class="step-badge">1</span>
          <div>
            <h2>인증</h2>
            <p class="hint">먼저 회원가입 또는 로그인해야 정책 조회가 가능합니다.</p>
          </div>
        </div>

        <div class="tab-bar" id="authTabBar">
          <button class="tab active" data-tab="signup">회원가입</button>
          <button class="tab" data-tab="login">로그인</button>
        </div>

        <div id="tab-signup">
          <div class="form-row two-col">
            <div>
              <label for="signupEmail">이메일</label>
              <input id="signupEmail" type="email" value="demo1@bengo.app" />
            </div>
            <div>
              <label for="signupPassword">비밀번호 (8자 이상)</label>
              <input id="signupPassword" type="password" value="P@ssw0rd!" />
            </div>
          </div>
          <div class="form-row three-col">
            <div>
              <label for="signupAge">나이</label>
              <input id="signupAge" type="number" value="26" min="14" max="120" />
            </div>
            <div>
              <label for="signupGender">성별</label>
              <select id="signupGender">
                <option value="unspecified" selected>미지정</option>
                <option value="male">남성</option>
                <option value="female">여성</option>
                <option value="other">기타</option>
              </select>
            </div>
            <div>
              <label for="signupRegion">거주 지역</label>
              <select id="signupRegion">
                <option value="seoul" selected>서울</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <label>관심 분야 (1개 이상)</label>
            <div class="inline-checks">
              <label class="check-label"><input type="checkbox" name="signupInterest" value="youth_policy" checked /> 청년정책</label>
              <label class="check-label"><input type="checkbox" name="signupInterest" value="childcare_policy" /> 육아/돌봄</label>
            </div>
          </div>
          <button id="signupBtn" class="btn-full">회원가입 후 자동 로그인</button>
        </div>

        <div id="tab-login" style="display:none">
          <div class="form-row two-col">
            <div>
              <label for="loginEmail">이메일</label>
              <input id="loginEmail" type="email" value="demo1@bengo.app" />
            </div>
            <div>
              <label for="loginPassword">비밀번호</label>
              <input id="loginPassword" type="password" value="P@ssw0rd!" />
            </div>
          </div>
          <button id="loginBtn" class="btn-full">로그인</button>
        </div>
      </section>

      <!-- ── 2. 파이프라인 (데이터 수집) ── -->
      <section class="card">
        <div class="section-header">
          <span class="step-badge">2</span>
          <div>
            <h2>파이프라인 <span class="badge-admin">관리자</span></h2>
            <p class="hint">정책 데이터를 외부 API에서 수집해 DB에 저장합니다.</p>
          </div>
        </div>

        <div class="pipeline-actions">
          <div class="pipe-btn-group">
            <button id="collectMvpBtn" class="btn-primary-lg">
              <span class="btn-icon">▶</span>
              <span>
                <strong>MVP 전체 수집 · 저장</strong>
                <small>data-go-kr + 온통청년 + 서울 열린데이터</small>
              </span>
            </button>
          </div>

          <div class="pipe-btn-group">
            <div class="form-row two-col" style="margin-bottom:0">
              <select id="singleSource">
                <option value="data-go-kr">data-go-kr (공공서비스)</option>
                <option value="youthcenter-policy">youthcenter-policy (온통청년 정책)</option>
                <option value="youthcenter-center">youthcenter-center (청년센터)</option>
                <option value="seoul-open-api">seoul-open-api (서울 열린데이터)</option>
                <option value="mock-seoul">mock-seoul (테스트용 더미)</option>
              </select>
              <button id="collectOneBtn" class="secondary">소스 1개만 수집</button>
            </div>
          </div>

          <div class="divider"></div>

          <div class="pipe-btn-group small-btns">
            <button id="sourcesBtn" class="secondary">소스 목록 확인</button>
            <button id="qualityReportBtn" class="secondary">품질 리포트</button>
            <button id="enrichBtn" class="secondary">데이터 보강 (크롤링)</button>
            <button id="pruneMvpBtn" class="danger">범위 밖 정책 비활성화</button>
          </div>
        </div>

        <div id="collectProgress" class="collect-progress" style="display:none">
          <div class="spinner"></div>
          <span id="collectProgressText">수집 중...</span>
        </div>
      </section>

      <!-- ── 3. 정책 목록 / 상세 / 적격성 판별 ── -->
      <section class="card wide">
        <div class="section-header">
          <span class="step-badge">3</span>
          <div>
            <h2>정책 조회 · 적격성 판별</h2>
            <p class="hint">① 목록 조회 → ② 정책 클릭해서 선택 → ③ 상세보기 또는 적격성 판별</p>
          </div>
        </div>

        <div class="filter-bar">
          <input id="search" type="text" placeholder="검색어 (예: 청년, 주거, 취업)" />
          <select id="interest">
            <option value="">분야 전체</option>
            <option value="youth_policy">청년정책</option>
            <option value="childcare_policy">육아/돌봄</option>
          </select>
          <select id="regionCode">
            <option value="">내 지역 (프로필 기준)</option>
            <option value="seoul">서울</option>
          </select>
          <select id="sortBy">
            <option value="relevance">관련도순</option>
            <option value="deadline">마감일순</option>
            <option value="latest">최신순</option>
          </select>
          <select id="order">
            <option value="desc">내림차순</option>
            <option value="asc">오름차순</option>
          </select>
          <label class="check-label">
            <input id="onlyAvailable" type="checkbox" checked style="width:auto" />
            내 조건에 맞는 것만
          </label>
          <button id="listPoliciesBtn">목록 조회</button>
        </div>

        <div class="policy-layout">
          <!-- 왼쪽: 목록 -->
          <div class="policy-list-panel">
            <div class="panel-header">
              <span id="policyListCount" class="count-badge">-</span>
              <span>정책 목록</span>
              <span class="hint-inline">클릭하면 선택됩니다</span>
            </div>
            <div id="policyList" class="list"></div>
          </div>

          <!-- 오른쪽: 선택 정책 작업 -->
          <div class="policy-action-panel">
            <div class="panel-header">선택된 정책</div>

            <div id="selectedPolicyInfo" class="selected-policy-info" style="display:none">
              <span id="selectedPolicyTitle" class="selected-policy-title"></span>
            </div>

            <div class="form-row">
              <label for="policyId">Policy ID (목록에서 클릭 시 자동 입력)</label>
              <input id="policyId" type="text" placeholder="UUID" />
            </div>

            <div class="action-group">
              <div class="action-group-title">상세 조회</div>
              <button id="policyDetailBtn" class="secondary btn-full">상세 정보 보기</button>
            </div>

            <div class="action-group">
              <div class="action-group-title">적격성 판별</div>
              <div id="requirementsForm" class="requirements-form" style="display:none">
                <p class="hint" style="margin:0 0 8px 0">이 정책의 자격 조건입니다. 입력 후 판별 버튼을 누르세요.</p>
                <div id="requirementsFields"></div>
              </div>
              <div class="form-row" style="margin-top:4px">
                <details>
                  <summary style="cursor:pointer;font-size:12px;color:#888">JSON 직접 입력 (고급)</summary>
                  <textarea id="answersJson" rows="3" style="margin-top:4px">{}</textarea>
                </details>
              </div>
              <button id="checkEligibilityBtn" class="btn-full" style="margin-top:8px">적격성 판별하기</button>
              <div id="eligibilityResult" class="eligibility-result" style="display:none"></div>
            </div>

            <div class="action-group">
              <div class="action-group-title">내 정책 상태 관리</div>
              <div class="form-row two-col" style="margin-bottom:8px">
                <div>
                  <label for="policyState">상태</label>
                  <select id="policyState">
                    <option value="discovered">discovered (발견)</option>
                    <option value="in_review">in_review (검토 중)</option>
                    <option value="applied">applied (신청 완료)</option>
                    <option value="hidden">hidden (숨김)</option>
                  </select>
                </div>
                <div>
                  <label for="policyNote">메모</label>
                  <input id="policyNote" type="text" placeholder="선택" />
                </div>
              </div>
              <div class="actions">
                <button id="updateStateBtn" class="secondary">상태 저장</button>
                <button id="myPoliciesBtn" class="secondary">내 정책 목록</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ── 4. 응답 로그 ── -->
      <section class="card wide">
        <div class="section-header" style="margin-bottom:8px">
          <span class="step-badge muted">✦</span>
          <div>
            <h2>응답 로그</h2>
          </div>
          <button id="copyLogBtn" class="btn-sm secondary" style="margin-left:auto">복사</button>
          <button id="clearLogBtn" class="btn-sm secondary">지우기</button>
        </div>
        <pre id="responseLog"></pre>
      </section>

    </main>

    <script src="./app.js"></script>
  </body>
</html>
